<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ART-Sale - Нет соединения</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #c17b5a20 0%, #2a3f6e20 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .offline-container {
            text-align: center;
            max-width: 400px;
            background: white;
            border-radius: 48px;
            padding: 3rem 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .offline-icon { font-size: 4rem; margin-bottom: 1rem; }
        h1 { color: #c17b5a; margin-bottom: 1rem; }
        p { color: #666; margin-bottom: 2rem; }
        .retry-btn {
            background: #c17b5a;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
        }
        .retry-btn:hover { background: #a05e42; }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <h1>Нет соединения</h1>
        <p>Проверьте интернет. Как только связь восстановится, приложение продолжит работу.</p>
        <button class="retry-btn" onclick="location.reload()">⟳ Попробовать снова</button>
    </div>
    <script>
        setInterval(() => { if (navigator.onLine) location.reload(); }, 5000);
    </script>
</body>
</html>
