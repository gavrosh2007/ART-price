<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Art Price</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Art Price">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1e2b4f">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        
        body {
            background-image: url('5.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
            min-height: 100vh;
            padding: 20px;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: inherit;
            filter: blur(3px);
            transform: scale(1.02);
            z-index: -2;
        }
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(30, 43, 79, 0.2);
            z-index: -1;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(4px);
            border-radius: 48px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        /* Верхняя панель: кнопка "Список" слева, языки справа */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .list-btn {
            background: rgba(255,255,255,0.4);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.4);
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .list-btn:hover {
            background: rgba(255,255,255,0.7);
            transform: scale(1.02);
        }
        .lang-switch {
            display: flex;
            gap: 12px;
            background: rgba(255,255,255,0.3);
            padding: 5px 12px;
            border-radius: 40px;
            backdrop-filter: blur(2px);
        }
        .lang-btn {
            background: rgba(255,255,255,0.6);
            border: none;
            font-size: 0.85rem;
            padding: 5px 14px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .lang-btn.active {
            background: #1e2b4f;
            color: white;
        }
        
        /* PWA блок (как в Hermes) */
        .install-area {
            text-align: center;
            margin: 0 0 25px 0;
        }
        .install-tooltip {
            position: relative;
            display: inline-block;
        }
        .pwa-icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #1e2b4f;
            padding: 8px 16px;
            background: transparent;
            transition: 0.2s;
        }
        .pwa-icon-btn img {
            width: 96px;
            height: 96px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .tooltip-text {
            visibility: hidden;
            background-color: #1e2b4f;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 5px 10px;
            position: absolute;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            font-size: 0.7rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 20;
        }
        .install-tooltip:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }
        
        .two-columns {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            margin-top: 20px;
        }
        .left-col {
            flex: 1;
            min-width: 280px;
        }
        .right-col {
            flex: 1;
            min-width: 280px;
        }
        
        .glass-toggle {
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(4px);
            border-radius: 60px;
            padding: 8px;
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.4);
        }
        .toggle-btn {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            background: transparent;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
        }
        .toggle-btn.active {
            background: white;
            color: #1e2b4f;
            box-shadow: 0 4px 12px rgba(30,43,79,0.2);
        }
        
        .glass-card {
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(4px);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.4);
            cursor: pointer;
            transition: 0.2s;
        }
        .glass-card:hover {
            transform: translateY(-6px);
        }
        .card-preview {
            height: 250px;
            background: rgba(217,226,239,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }
        .card-footer {
            padding: 20px;
            text-align: center;
            font-weight: 600;
            color: #2a3f6e;
            background: rgba(255,255,255,0.6);
        }
        
        .glass-instructions {
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(4px);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.4);
            color: #1e2b4f;
            height: 100%;
        }
        .glass-instructions h4 {
            margin-bottom: 12px;
            font-size: 1.2rem;
            border-left: 4px solid #c17b5a;
            padding-left: 12px;
        }
        .glass-instructions p, .glass-instructions ul {
            margin-bottom: 10px;
            font-size: 0.9rem;
        }
        .glass-instructions ul {
            padding-left: 20px;
        }
        .glass-instructions li {
            margin-bottom: 5px;
        }
        
        .book-container {
            margin-top: 20px;
        }
        .pdf-container {
            height: 70vh;
            border-radius: 24px;
            overflow: hidden;
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.4);
        }
        .pdf-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .btn-download {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background: #1e2b4f;
            color: white;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
        }
        .hidden {
            display: none;
        }
        
        /* Модальное окно для списка владельцев */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: rgba(255,255,255,0.96);
            border-radius: 32px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 28px;
            position: relative;
            color: #1e2b4f;
        }
        .modal-content h3 {
            margin-bottom: 20px;
            border-left: 4px solid #c17b5a;
            padding-left: 15px;
        }
        .owner-item {
            padding: 12px;
            margin-bottom: 8px;
            background: rgba(0,0,0,0.03);
            border-radius: 16px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .owner-item:hover {
            background: rgba(193,123,90,0.2);
            transform: translateX(4px);
        }
        .owner-emoji {
            font-size: 1.8rem;
        }
        .owner-name {
            font-size: 1.1rem;
            font-weight: 500;
        }
        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }
        .close-modal:hover { color: #c17b5a; }
        
        @media (max-width: 800px) {
            .two-columns { flex-direction: column; }
            .glass-toggle { max-width: 100%; }
            .pwa-icon-btn img { width: 64px; height: 64px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <button class="list-btn" id="listButton">📋 <span id="listButtonText">Список</span></button>
        <div class="lang-switch">
            <button class="lang-btn active" data-lang="ru">🇷🇺 РУС</button>
            <button class="lang-btn" data-lang="en">🇬🇧 ENG</button>
        </div>
    </div>

    <div class="install-area">
        <div class="install-tooltip">
            <button id="pwaInstallIcon" class="pwa-icon-btn">
                <img src="icon-192x192.png" alt="Установить" width="96" height="96" onerror="this.style.display='none'; this.parentNode.querySelector('.fallback-text').style.display='inline-block';">
                <span class="fallback-text" style="display:none;">📱</span>
                <span id="pwaButtonText">Установить</span>
            </button>
            <span class="tooltip-text" id="pwaTooltip">💡 Нажмите — установите как приложение.<br>• Chrome/Edge: появится диалог.<br>• iPhone: Поделиться → На экран «Домой».</span>
        </div>
    </div>

    <div class="two-columns">
        <div class="left-col">
            <div class="glass-toggle">
                <button class="toggle-btn active" id="galleryToggle">Галерея</button>
                <button class="toggle-btn" id="bookToggle">Книга</button>
            </div>
            <div id="galleryCardWrapper">
                <div class="glass-card" id="galleryCard">
                    <div class="card-preview">📄</div>
                    <div class="card-footer" id="galleryCardText">работы и цены</div>
                </div>
            </div>
            <div id="bookContainer" class="book-container hidden">
                <div class="pdf-container">
                    <iframe id="pdfFrame" src="" allowfullscreen></iframe>
                </div>
                <a class="btn-download" id="downloadBtn" href="#">Скачать PDF</a>
            </div>
        </div>
        <div class="right-col">
            <div class="glass-instructions" id="instructionsBlock"></div>
        </div>
    </div>
</div>

<!-- Модальное окно со списком владельцев -->
<div id="ownerModal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <h3 id="modalOwnersTitle">📋 Выберите владельца</h3>
        <div id="ownersListContainer">
            <!-- список загрузится из JSON -->
        </div>
    </div>
</div>

<script>
    // ========== ДАННЫЕ ВЛАДЕЛЬЦЕВ (ЗАГРУЖАЮТСЯ ИЗ JSON) ==========
    let owners = [];
    let currentOwnerId = null;
    
    async function loadOwners() {
        try {
            const response = await fetch('owners.json');
            if (!response.ok) throw new Error('owners.json not found');
            owners = await response.json();
            if (!owners.length) owners = [];
        } catch (error) {
            console.warn('owners.json не загружен, создаём демо-владельца');
            owners = [];
        }
        // Если нет владельцев, создаём одного демо
        if (owners.length === 0) {
            owners = [{
                id: 1,
                nameRu: "Владелец (пример)",
                nameEn: "Owner (example)",
                pdfViewUrl: "https://drive.google.com/file/d/13Z9w4_ur2c_CxgnIaeu1W5fSQeA_VNoK/preview",
                pdfDownloadUrl: "https://drive.google.com/uc?export=download&id=13Z9w4_ur2c_CxgnIaeu1W5fSQeA_VNoK",
                emoji: "📄"
            }];
        }
        currentOwnerId = owners[0].id;
        updateBookForOwner(currentOwnerId);
        // Карточку галереи не трогаем, она общая
    }
    
    function updateBookForOwner(ownerId) {
        const owner = owners.find(o => o.id == ownerId);
        if (!owner) return;
        const pdfFrame = document.getElementById('pdfFrame');
        const downloadBtn = document.getElementById('downloadBtn');
        if (pdfFrame) pdfFrame.src = owner.pdfViewUrl;
        if (downloadBtn) downloadBtn.href = owner.pdfDownloadUrl;
    }
    
    function showOwnersList() {
        const container = document.getElementById('ownersListContainer');
        const t = translations[currentLang];
        if (!container) return;
        if (owners.length === 0) {
            container.innerHTML = `<p style="padding:20px; text-align:center;">${t.noOwners}</p>`;
        } else {
            container.innerHTML = owners.map(owner => `
                <div class="owner-item" data-owner-id="${owner.id}">
                    <div class="owner-emoji">${owner.emoji || '📄'}</div>
                    <div class="owner-name">${currentLang === 'ru' ? owner.nameRu : owner.nameEn}</div>
                </div>
            `).join('');
            document.querySelectorAll('.owner-item').forEach(el => {
                el.addEventListener('click', () => {
                    const newOwnerId = parseInt(el.dataset.ownerId);
                    currentOwnerId = newOwnerId;
                    updateBookForOwner(currentOwnerId);
                    document.getElementById('ownerModal').classList.remove('active');
                });
            });
        }
        document.getElementById('ownerModal').classList.add('active');
    }
    
    // ========== ПЕРЕВОД ==========
    const translations = {
        ru: {
            gallery: 'Галерея',
            book: 'Книга',
            galleryCard: 'работы и цены',
            download: 'Скачать PDF',
            pwaButton: 'Установить',
            pwaTooltip: '💡 Нажмите — установите как приложение.\n• Chrome/Edge: появится диалог.\n• iPhone: Поделиться → На экран «Домой».',
            instructions: `
                <h4>📘 Как добавить свою работу</h4>
                <p><strong>Для продавцов:</strong></p>
                <ul>
                    <li>Свяжитесь с нами по контактам ниже, чтобы разместить ваше искусство.</li>
                    <li>Вы можете прислать фото (даже с телефона), название, цену и ссылку на внешний сайт.</li>
                    <li>Мы добавим вашу работу в PDF-каталог и на сайт.</li>
                </ul>
                <p><strong>Для покупателей:</strong></p>
                <ul>
                    <li>Нажмите на карточку "работы и цены" или откройте PDF.</li>
                    <li>Для покупки свяжитесь с нами напрямую: напишите в WhatsApp, Telegram или по email.</li>
                </ul>
                <p><strong>Контакты:</strong><br>
                📞 +357 99 453575<br>
                ✉️ gavrosh2007@gmail.com<br>
                💬 Telegram: @hermesmcbot</p>
                <p style="font-size:0.8rem;">Все заявки обрабатываются вручную. Мы свяжемся с вами.</p>
            `,
            listButton: 'Список',
            modalOwnersTitle: '📋 Выберите владельца',
            noOwners: 'Список владельцев пуст. Добавьте данные в файл owners.json'
        },
        en: {
            gallery: 'Gallery',
            book: 'Book',
            galleryCard: 'works and prices',
            download: 'Download PDF',
            pwaButton: 'Install',
            pwaTooltip: '💡 Click — install as app.\n• Chrome/Edge: dialog appears.\n• iPhone: Share → Add to Home Screen.',
            instructions: `
                <h4>📘 How to add your artwork</h4>
                <p><strong>For sellers:</strong></p>
                <ul>
                    <li>Contact us via the details below to list your art.</li>
                    <li>You can send a photo (even from phone), title, price and external link.</li>
                    <li>We will add your work to the PDF catalog and website.</li>
                </ul>
                <p><strong>For buyers:</strong></p>
                <ul>
                    <li>Click on "works and prices" card or open the PDF.</li>
                    <li>To purchase, contact us directly via WhatsApp, Telegram or email.</li>
                </ul>
                <p><strong>Contacts:</strong><br>
                📞 +357 99 453575<br>
                ✉️ gavrosh2007@gmail.com<br>
                💬 Telegram: @hermesmcbot</p>
                <p style="font-size:0.8rem;">All requests are handled manually. We will contact you.</p>
            `,
            listButton: 'List',
            modalOwnersTitle: '📋 Select owner',
            noOwners: 'Owner list is empty. Add data to owners.json'
        }
    };
    
    let currentLang = 'ru';
    
    function setLanguage(lang) {
        currentLang = lang;
        const t = translations[lang];
        document.getElementById('galleryToggle').innerHTML = t.gallery;
        document.getElementById('bookToggle').innerHTML = t.book;
        document.getElementById('galleryCardText').innerHTML = t.galleryCard;
        document.getElementById('downloadBtn').innerHTML = t.download;
        document.getElementById('pwaButtonText').innerHTML = t.pwaButton;
        document.getElementById('pwaTooltip').innerHTML = t.pwaTooltip;
        document.getElementById('instructionsBlock').innerHTML = t.instructions;
        document.getElementById('listButtonText').innerHTML = t.listButton;
        document.getElementById('modalOwnersTitle').innerHTML = t.modalOwnersTitle;
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.dataset.lang === lang) btn.classList.add('active');
        });
    }
    
    // Переключение вкладок
    const galleryToggle = document.getElementById('galleryToggle');
    const bookToggle = document.getElementById('bookToggle');
    const galleryCardWrapper = document.getElementById('galleryCardWrapper');
    const bookContainer = document.getElementById('bookContainer');
    
    galleryToggle.addEventListener('click', () => {
        galleryToggle.classList.add('active');
        bookToggle.classList.remove('active');
        galleryCardWrapper.classList.remove('hidden');
        bookContainer.classList.add('hidden');
    });
    bookToggle.addEventListener('click', () => {
        bookToggle.classList.add('active');
        galleryToggle.classList.remove('active');
        galleryCardWrapper.classList.add('hidden');
        bookContainer.classList.remove('hidden');
    });
    
    // Переключение языка
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', (e) => setLanguage(e.target.dataset.lang));
    });
    
    // Кнопка "Список"
    document.getElementById('listButton').addEventListener('click', showOwnersList);
    
    // Закрытие модального окна
    const modal = document.getElementById('ownerModal');
    modal.querySelector('.close-modal').addEventListener('click', () => modal.classList.remove('active'));
    window.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });
    
    // PWA
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
    });
    document.getElementById('pwaInstallIcon').addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            await deferredPrompt.userChoice;
            deferredPrompt = null;
        } else {
            alert('Для установки: Chrome/Edge — значок ⬇️ в адресной строке, iPhone — Поделиться → На экран "Домой"');
        }
    });
    
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/ART-Sale/sw.js')
            .then(reg => console.log('SW registered'))
            .catch(err => console.error('SW failed', err));
    }
    
    // Запуск
    loadOwners().then(() => {
        setLanguage('ru');
    });
</script>
</body>
</html>
