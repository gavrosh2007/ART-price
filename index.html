<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Art Price</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #eef2f7; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 40px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        h1 { font-size: 2rem; margin-bottom: 20px; }
        .view-toggle { display: flex; gap: 15px; margin-bottom: 30px; background: #e9eef3; padding: 8px; border-radius: 60px; max-width: 300px; }
        .toggle-btn { flex: 1; padding: 14px 24px; border: none; border-radius: 50px; font-weight: 600; background: transparent; cursor: pointer; }
        .toggle-btn.active { background: white; color: #1e2b4f; box-shadow: 0 10px 20px -10px #1e2b4f; }
        .gallery-view, .book-view { transition: 0.3s; }
        .hidden { display: none; }
        .single-card {
            max-width: 300px; margin: 0 auto; background: #f8faff; border-radius: 24px; overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,20,40,0.06); border: 1px solid #dee6f0; cursor: pointer;
        }
        .single-card:hover { transform: translateY(-6px); box-shadow: 0 18px 30px rgba(0,60,130,0.15); }
        .card-preview { height: 250px; background: #d9e2ef; display: flex; align-items: center; justify-content: center; font-size: 3rem; }
        .card-footer { padding: 20px; text-align: center; font-weight: 600; color: #2a3f6e; background: white; }
        .pdf-container { height: 80vh; border-radius: 24px; overflow: hidden; box-shadow: 0 20px 30px -12px #1a2639; }
        .pdf-container iframe { width: 100%; height: 100%; border: none; }
        .btn { display: inline-block; padding: 14px 40px; border-radius: 60px; background: #1e2b4f; color: white; text-decoration: none; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ Art Price</h1>
        <div class="view-toggle">
            <button class="toggle-btn active" id="galleryToggle">Галерея</button>
            <button class="toggle-btn" id="bookToggle">Книга</button>
        </div>

        <div class="gallery-view" id="galleryView">
            <div class="single-card" onclick="window.open('https://drive.google.com/file/d/13Z9w4_ur2c_CxgnIaeu1W5fSQeA_VNoK/view#page=1', '_blank')">
                <div class="card-preview">📄</div>
                <div class="card-footer">работы и цены</div>
            </div>
        </div>

        <div class="book-view hidden" id="bookView">
            <div class="pdf-container">
                <iframe src="https://drive.google.com/file/d/13Z9w4_ur2c_CxgnIaeu1W5fSQeA_VNoK/preview" allowfullscreen></iframe>
            </div>
            <a class="btn" href="https://drive.google.com/uc?export=download&id=13Z9w4_ur2c_CxgnIaeu1W5fSQeA_VNoK">Скачать PDF</a>
        </div>
    </div>

    <script>
        const galleryToggle = document.getElementById('galleryToggle');
        const bookToggle = document.getElementById('bookToggle');
        const galleryView = document.getElementById('galleryView');
        const bookView = document.getElementById('bookView');

        galleryToggle.addEventListener('click', () => {
            galleryToggle.classList.add('active');
            bookToggle.classList.remove('active');
            galleryView.classList.remove('hidden');
            bookView.classList.add('hidden');
        });

        bookToggle.addEventListener('click', () => {
            bookToggle.classList.add('active');
            galleryToggle.classList.remove('active');
            bookView.classList.remove('hidden');
            galleryView.classList.add('hidden');
        });
    </script>
</body>
</html>
